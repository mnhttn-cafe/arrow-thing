name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  pull_request:
  push:
    branches:
      - main
      - master

permissions:
  checks: write
  contents: read

jobs:
  format:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dotnet tools
        run: dotnet tool restore

      - name: Check C# formatting (CSharpier)
        run: dotnet csharpier check Assets/Scripts/ Assets/Tests/

      - name: Check file sizes (100 MB limit)
        run: |
          errors=0
          while IFS= read -r file; do
            size=$(stat -c%s "$file" 2>/dev/null) || continue
            if [ "$size" -ge 104857600 ]; then
              size_mb=$((size / 1048576))
              echo "ERROR: $file is ${size_mb} MB (>= 100 MB). Use Git LFS or reduce file size."
              errors=1
            fi
          done < <(git ls-files)
          if [ $errors -ne 0 ]; then
            exit 1
          fi
          echo "No oversized files found."

      - name: Check meta file sync
        run: |
          errors=0
          while IFS= read -r file; do
            case "$file" in *.meta) continue ;; esac
            if ! git ls-files --error-unmatch "$file.meta" > /dev/null 2>&1; then
              echo "ERROR: $file tracked without its .meta file"
              errors=1
            fi
          done < <(git ls-files -- 'Assets/*')
          if [ $errors -ne 0 ]; then
            exit 1
          fi
          echo "All Asset files have matching .meta files."

  resolve-unity-version:
    runs-on: ubuntu-latest
    outputs:
      unity-version: ${{ steps.parse.outputs.version }}
      docker-image: ${{ steps.parse.outputs.image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Parse Unity version
        id: parse
        run: |
          version=$(head -1 ProjectSettings/ProjectVersion.txt | sed 's/m_EditorVersion: //')
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "image=unityci/editor:ubuntu-${version}-webgl-3" >> "$GITHUB_OUTPUT"

  test:
    runs-on: ubuntu-latest
    needs: resolve-unity-version

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Unity Docker image
        uses: actions/cache@v4
        with:
          path: ~/docker-cache/unity-editor.tar
          key: docker-unity-${{ needs.resolve-unity-version.outputs.unity-version }}

      - name: Load cached Docker image
        run: |
          if [ -f ~/docker-cache/unity-editor.tar ]; then
            docker load -i ~/docker-cache/unity-editor.tar
          fi

      - name: Run EditMode tests
        uses: game-ci/unity-test-runner@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          testMode: EditMode
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          checkName: EditMode tests
          customImage: ${{ needs.resolve-unity-version.outputs.docker-image }}
          customParameters: -nographics

      - name: Save Docker image to cache
        run: |
          if [ ! -f ~/docker-cache/unity-editor.tar ]; then
            mkdir -p ~/docker-cache
            image=$(docker images --format '{{.Repository}}:{{.Tag}}' | grep '^unityci/editor:' | head -1)
            docker save -o ~/docker-cache/unity-editor.tar "$image"
          fi

  test-playmode:
    runs-on: ubuntu-latest
    needs: [resolve-unity-version, test]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Unity Docker image
        uses: actions/cache@v4
        with:
          path: ~/docker-cache/unity-editor.tar
          key: docker-unity-${{ needs.resolve-unity-version.outputs.unity-version }}

      - name: Load cached Docker image
        run: |
          if [ -f ~/docker-cache/unity-editor.tar ]; then
            docker load -i ~/docker-cache/unity-editor.tar
          fi

      - name: Run PlayMode tests
        uses: game-ci/unity-test-runner@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          testMode: PlayMode
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          checkName: PlayMode tests
          customImage: ${{ needs.resolve-unity-version.outputs.docker-image }}
          customParameters: --burst-disable-compilation

      - name: Save Docker image to cache
        run: |
          if [ ! -f ~/docker-cache/unity-editor.tar ]; then
            mkdir -p ~/docker-cache
            image=$(docker images --format '{{.Repository}}:{{.Tag}}' | grep '^unityci/editor:' | head -1)
            docker save -o ~/docker-cache/unity-editor.tar "$image"
          fi
