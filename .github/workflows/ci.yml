name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

permissions:
  checks: write
  contents: read

jobs:
  format:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check C# formatting
        run: |
          errors=0
          while IFS= read -r file; do
            if grep -Pn '\t' "$file" > /dev/null 2>&1; then
              echo "ERROR: Tab characters found in $file (use 4 spaces)"
              errors=1
            fi
            if grep -Pn ' +$' "$file" > /dev/null 2>&1; then
              echo "ERROR: Trailing whitespace found in $file"
              errors=1
            fi
            if [ -n "$(tail -c 1 "$file")" ]; then
              echo "ERROR: Missing final newline in $file"
              errors=1
            fi
            if grep -Pn 'System\.Collections\.Generic\.' "$file" | grep -v '^\s*using ' > /dev/null 2>&1; then
              echo "ERROR: Fully qualified System.Collections.Generic usage in $file (add a using directive)"
              errors=1
            fi
          done < <(find Assets/Scripts Assets/Tests -name '*.cs' 2>/dev/null)
          if [ $errors -ne 0 ]; then
            echo ""
            echo "Formatting check failed."
            exit 1
          fi
          echo "All formatting checks passed."

  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run EditMode tests
        uses: game-ci/unity-test-runner@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          testMode: EditMode
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          checkName: EditMode tests
          customParameters: -nographics
