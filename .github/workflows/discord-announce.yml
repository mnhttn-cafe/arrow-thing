name: Discord Announcement

on:
  workflow_run:
    workflows: ["Deploy WebGL to GitHub Pages"]
    types: [completed]

jobs:
  announce:
    runs-on: ubuntu-latest
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      startsWith(github.event.workflow_run.head_branch, 'v')
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch tag objects
        run: git fetch origin --tags --force

      - name: Get release notes
        id: notes
        run: |
          TAG="${{ github.event.workflow_run.head_branch }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

          # Extract annotated tag message via cat-file (skip header, keep everything after first blank line)
          BODY=$(git cat-file tag "$TAG" 2>/dev/null | sed '1,/^$/d')
          if [ -z "$BODY" ]; then
            BODY="No release notes provided."
          fi

          # Write to file to preserve newlines
          printf '%s' "$BODY" > /tmp/release_notes.txt

      - name: Post to Discord
        run: |
          TAG="${{ steps.notes.outputs.tag }}"

          # Build message with real newlines, then let jq handle JSON escaping
          {
            printf '**Arrow Thing %s** is out!\n\n' "$TAG"
            cat /tmp/release_notes.txt
            printf '\nPlay now: https://vicplusplus.github.io/arrow-thing/'
          } > /tmp/discord_message.txt

          PAYLOAD=$(jq -n --rawfile content /tmp/discord_message.txt '{content: $content}')

          curl -H "Content-Type: application/json" \
               -d "$PAYLOAD" \
               "${{ secrets.DISCORD_WEBHOOK_URL }}"
