name: Discord Announcement

on:
  workflow_run:
    workflows: ["Deploy WebGL to Cloudflare Pages"]
    types: [completed]

jobs:
  announce:
    runs-on: ubuntu-latest
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'release'
    steps:
      - name: Get release notes
        id: notes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Find the latest release
          RELEASE=$(gh api repos/${{ github.repository }}/releases/latest)
          TAG=$(echo "$RELEASE" | jq -r '.tag_name')
          BODY=$(echo "$RELEASE" | jq -r '.body')

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

          if [ -z "$BODY" ] || [ "$BODY" = "null" ]; then
            BODY="No release notes provided."
          fi

          printf '%s' "$BODY" > /tmp/release_notes.txt

      - name: Post to Discord
        run: |
          TAG="${{ steps.notes.outputs.tag }}"
          SHA="${{ github.event.workflow_run.head_sha }}"
          SHORT_SHA="${SHA:0:7}"

          # Build message with real newlines, then let jq handle JSON escaping
          {
            printf '**Arrow Thing %s** is out! (`%s`)\n\n' "$TAG" "$SHORT_SHA"
            cat /tmp/release_notes.txt
            printf '\nPlay now: https://arrow-thing.com/\n\n<@&1483631517681975406>'
          } > /tmp/discord_message.txt

          PAYLOAD=$(jq -n --rawfile content /tmp/discord_message.txt '{content: $content, allowed_mentions: {parse: ["roles"]}}')

          curl -H "Content-Type: application/json" \
               -d "$PAYLOAD" \
               "${{ secrets.DISCORD_WEBHOOK_URL }}"
