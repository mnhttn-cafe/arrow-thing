name: Deploy Server

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  IMAGE: ghcr.io/vicplusplus/arrow-thing-api

on:
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: deploy-server
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: server
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy to VPS
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts
          ssh -i ~/.ssh/id_ed25519 deploy@${{ secrets.VPS_HOST }} \
            "cd /home/deploy/arrow-thing && docker compose pull api && docker compose up -d --no-deps api"

      - name: Health check
        run: |
          echo "Waiting for container to be ready..."
          sleep 5
          for i in $(seq 1 6); do
            STATUS=$(curl -o /dev/null -s -w "%{http_code}" https://api.arrow-thing.com/health)
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed (HTTP $STATUS)"
              exit 0
            fi
            echo "Attempt $i: HTTP $STATUS — retrying in 10s..."
            sleep 10
          done
          echo "Health check failed after all retries"
          exit 1
