name: Deploy WebGL to GitHub Pages

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-webgl:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve Unity Docker image
        id: unity
        run: |
          version=$(head -1 ProjectSettings/ProjectVersion.txt | sed 's/m_EditorVersion: //')
          echo "image=unityci/editor:ubuntu-${version}-webgl-3" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Cache Unity Docker image
        uses: actions/cache@v4
        with:
          path: ~/docker-cache/unity-editor.tar
          key: docker-unity-webgl-${{ steps.unity.outputs.version }}

      - name: Load cached Docker image
        run: |
          if [ -f ~/docker-cache/unity-editor.tar ]; then
            docker load -i ~/docker-cache/unity-editor.tar
          fi

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-WebGL-6000.3.8f1-${{ hashFiles('Assets/**', 'Packages/manifest.json') }}
          restore-keys: |
            Library-WebGL-6000.3.8f1-
            Library-WebGL-

      - name: Inject git commit hash
        run: |
          mkdir -p Assets/Resources
          git rev-parse --short HEAD > Assets/Resources/git-commit.txt

      - name: Build WebGL
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          targetPlatform: WebGL
          customImage: ${{ steps.unity.outputs.image }}

      - name: Save Docker image to cache
        run: |
          if [ ! -f ~/docker-cache/unity-editor.tar ]; then
            mkdir -p ~/docker-cache
            image=$(docker images --format '{{.Repository}}:{{.Tag}}' | grep '^unityci/editor:' | head -1)
            docker save -o ~/docker-cache/unity-editor.tar "$image"
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/WebGL/WebGL

  deploy:
    runs-on: ubuntu-latest
    needs: build-webgl
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
