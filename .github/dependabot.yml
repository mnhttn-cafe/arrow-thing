version: 2
updates:
  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      actions:
        patterns:
          - "*"

  # .NET NuGet (server)
  - package-ecosystem: "nuget"
    directory: "/server/ArrowThing.Server"
    schedule:
      interval: "weekly"
    groups:
      dotnet:
        patterns:
          - "*"

  # .NET NuGet (server tests)
  - package-ecosystem: "nuget"
    directory: "/server/ArrowThing.Server.Tests"
    schedule:
      interval: "weekly"
    groups:
      dotnet-tests:
        patterns:
          - "*"

  # Docker base images
  - package-ecosystem: "docker"
    directory: "/server"
    schedule:
      interval: "weekly"
